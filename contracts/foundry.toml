[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
# Arc Testnet (chain id 5042002). Native gas is USDC at 18 decimals; the ERC-20
# USDC interface at 0x3600…0000 is 6 decimals — never mix the two.
arc_testnet = "https://rpc.testnet.arc.network"

[etherscan]
# Arcscan verification. Set ARCSCAN_API_KEY if the explorer requires a key.
arc_testnet = { key = "${ARCSCAN_API_KEY}", url = "https://testnet.arcscan.app/api", chain = 5042002 }
